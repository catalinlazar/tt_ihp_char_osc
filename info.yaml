# Tiny Tapeout project information
project:
  title:      "IHP Gate Delay Characterizer"
  author:     "Catalin Lazar"
  language:   "Verilog"
  description: "Measures 4 flavors of ring oscillators (Inv1, 2, 4, NAND) using a 24-bit counter."

# The linter wants this specific 'pinout' section
pinout:
  ui:
    - "reset_osc (manual)"
    - "enable_osc"
    - "byte_sel_bit0"
    - "byte_sel_bit1"
    - "ro_sel_bit0"
    - "ro_sel_bit1"
    - "unused_in6"
    - "unused_in7"
  uo:
    - "data_out0"
    - "data_out1"
    - "data_out2"
    - "data_out3"
    - "data_out4"
    - "data_out5"
    - "data_out6"
    - "data_out7"
  uio:
    - "unused_0"
    - "unused_1"
    - "unused_2"
    - "unused_3"
    - "unused_4"
    - "unused_5"
    - "unused_6"
    - "unused_7"

# These stay at the bottom
clock_hz: 10000000
tiles: "1x1"
top_module: "tt_um_catalinlazar_ihp_osc"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_catalinlazar_ihp_osc.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: ""
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6

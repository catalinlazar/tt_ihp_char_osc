# Tiny Tapeout project information
project:
  title:      "IHP Gate Delay Characterizer"
  author:     "Catalin Lazar"
  language:   "Verilog"
  description: "Measures 4 flavors of ring oscillators (Inv1, 2, 4, NAND) using a 24-bit counter."

# List your project's source files here.
source_files:
  - "tt_um_catalinlazar_ihp_osc.v"

# Correct Pinout Section (Use this list format for the datasheet)
pinout:
  ui:
    - "reset_osc (manual)"
    - "enable_osc"
    - "byte_sel_bit0"
    - "byte_sel_bit1"
    - "ro_sel_bit0"
    - "ro_sel_bit1"
    - "unused_in6"
    - "unused_in7"
  uo:
    - "data_out0"
    - "data_out1"
    - "data_out2"
    - "data_out3"
    - "data_out4"
    - "data_out5"
    - "data_out6"
    - "data_out7"
  uio:
    - "unused_0"
    - "unused_1"
    - "unused_2"
    - "unused_3"
    - "unused_4"
    - "unused_5"
    - "unused_6"
    - "unused_7"

# These stay at the bottom
clock_hz: 10000000
tiles: "1x1"
top_module: "tt_um_catalinlazar_ihp_osc"
yaml_version: 6
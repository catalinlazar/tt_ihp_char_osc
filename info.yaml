# Tiny Tapeout project information
project:
  title:      "IHP Gate Delay Characterizer"
  author:     "Catalin Lazar"
  language:   "Verilog"
  description: "Measures 4 flavors of ring oscillators (Inv1, 2, 4, 8) using a 24-bit counter."
  clock_hz:    10000000
  tiles:       "1x1"
  top_module:  "tt_um_catalinlazar_big_ihp_osc_array"
  source_files:
    - "tt_um_catalinlazar_big_ihp_osc_array.v"
    - "catalinlazar_ihp_ring_osc_1248.v"

# The pinout must use the bracketed index format for this version of the linter
pinout:
  # Inputs
  ena: "unused"
  clk: "clock"
  ui[0]: "rst_n (Global Reset)"
  ui[1]: "enable_osc"
  ui[2]: "byte_sel_bit0"
  ui[3]: "byte_sel_bit1"
  ui[4]: "ro_sel_bit0"
  ui[5]: "ro_sel_bit1"
  ui[6]: "ro_sel_bit2"
  ui[7]: "ro_sel_bit3"

  # Outputs
  uo[0]: "data_out0"
  uo[1]: "data_out1"
  uo[2]: "data_out2"
  uo[3]: "data_out3"
  uo[4]: "data_out4"
  uo[5]: "data_out5"
  uo[6]: "data_out6"
  uo[7]: "data_out7"

  # Bidirectional pins
  uio[0]: "unused_0"
  uio[1]: "unused_1"
  uio[2]: "unused_2"
  uio[3]: "unused_3"
  uio[4]: "unused_4"
  uio[5]: "unused_5"
  uio[6]: "unused_6"
  uio[7]: "unused_7"

# Do not change!
yaml_version: 6